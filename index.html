<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {

  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Courier New',monospace; cursor:default;
}

/* ── BIOS ── */
#bios {
  position:absolute; inset:0; background:#000; color:#aaa;
  font-family:'Courier New',monospace; font-size:13px; line-height:1.6;
  padding:18px 24px; display:block; z-index:10;
}
#bios .white  { color:#fff; }
#bios .yellow { color:#ff0; }
#bios .cyan   { color:#0ff; }
@keyframes blink { 50%{opacity:0} }
.blink { animation:blink 0.9s step-end infinite; }

/* ── LOGO SCREEN ── */
#logo-screen {
  position:absolute; inset:0; background:#000; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:32px; z-index:9;
}
.win-logo { display:grid; grid-template-columns:1fr 1fr; gap:4px; transform:skewY(-3deg); width:80px; height:72px; }
.pane { border-radius:1px; }
.pane-tl { background:#f03808; transform:skewX(-8deg); }
.pane-tr { background:#00b000; transform:skewX(-8deg); }
.pane-bl { background:#0000c8; transform:skewX(-8deg); }
.pane-br { background:#f0c000; transform:skewX(-8deg); }
.win-wordmark { display:flex; flex-direction:column; gap:2px; margin-left:12px; }
.logo-row { display:flex; align-items:center; gap:16px; }
.win-text-microsoft { color:#c8c8c8; font-family:'Times New Roman',serif; font-size:18px; font-style:italic; letter-spacing:1px; }
.win-text-windows { color:#fff; font-family:'Times New Roman',serif; font-size:38px; font-style:italic; font-weight:bold; letter-spacing:-1px; line-height:1; }
.win-text-95 { color:#fff; font-family:'Times New Roman',serif; font-size:38px; font-weight:bold; font-style:italic; margin-left:6px; }
.progress-container { width:200px; height:14px; border:1px solid #888; overflow:hidden; background:#000; position:relative; }
.progress-track { display:flex; position:absolute; left:0; top:0; height:100%; animation:slideTrack 1.2s linear infinite; }
.progress-block { width:18px; height:14px; flex-shrink:0; }
@keyframes slideTrack { from{transform:translateX(0)} to{transform:translateX(-20px)} }

/* ── DESKTOP ── */
#desktop { position:absolute; inset:0; background:#008080; display:none; flex-direction:column; z-index:1; }
#desktop-area { flex:1; position:relative; overflow:hidden; }

/* ── DESKTOP ICONS ── */
#icon-container {
  position:absolute; top:12px; left:12px;
  display:flex; flex-direction:column; gap:6px;
}
.icon {
  display:flex; flex-direction:column; align-items:center;
  gap:3px; width:72px; padding:4px 2px; cursor:pointer;
  border:1px solid transparent; user-select:none;
}
.icon:hover { background:rgba(0,0,128,0.5); border:1px dotted #fff; }
.icon.selected { background:rgba(0,0,128,0.7); border:1px dotted #fff; }
.icon-label {
  font-family:'Arial',sans-serif; font-size:11px; color:#fff;
  text-align:center; line-height:1.3; text-shadow:1px 1px 1px #000;
  word-break:break-word; max-width:68px;
}

/* ── TASKBAR ── */
.taskbar {
  width:100%; height:32px; background:#c0c0c0;
  border-top:2px solid #fff; display:flex; align-items:center;
  padding:0 4px; gap:4px; flex-shrink:0; position:relative; z-index:200;
}
.start-btn {
  display:flex; align-items:center; gap:4px; background:#c0c0c0;
  border-top:2px solid #fff; border-left:2px solid #fff;
  border-right:2px solid #444; border-bottom:2px solid #444;
  padding:2px 8px 2px 4px; font-family:'Arial',sans-serif;
  font-size:12px; font-weight:bold; color:#000; cursor:pointer; flex-shrink:0;
}
.start-btn:active { border-top:2px solid #444; border-left:2px solid #444; border-right:2px solid #fff; border-bottom:2px solid #fff; }
.start-logo { display:grid; grid-template-columns:1fr 1fr; gap:1px; width:16px; height:14px; }
.s-tl{background:#f03808} .s-tr{background:#00b000} .s-bl{background:#0000c8} .s-br{background:#f0c000}
.taskbar-time {
  margin-left:auto; font-family:'Arial',sans-serif; font-size:11px;
  border-top:1px solid #888; border-left:1px solid #888;
  border-right:1px solid #fff; border-bottom:1px solid #fff;
  padding:2px 6px; color:#000; background:#c0c0c0; flex-shrink:0;
}
#taskbar-btns { display:flex; gap:2px; flex:1; overflow:hidden; }
.taskbar-btn {
  height:22px; min-width:110px; max-width:150px; background:#c0c0c0;
  border-top:2px solid #fff; border-left:2px solid #fff;
  border-right:2px solid #444; border-bottom:2px solid #444;
  font-family:'Arial',sans-serif; font-size:11px; color:#000;
  padding:0 6px; cursor:pointer; display:flex; align-items:center; gap:4px;

}
.taskbar-btn.active { border-top:2px solid #444; border-left:2px solid #444; border-right:2px solid #fff; border-bottom:2px solid #fff; background:#b8b8b8; }

/* ── WIN95 WINDOW ── */

.doc-scroll {

/* ── HINT ── */
#hint {
  position:absolute; bottom:42px; left:50%; transform:translateX(-50%);
  font-family:'Arial',sans-serif; font-size:11px; color:#fff;
  background:rgba(0,0,0,0.45); padding:3px 10px;

/* ═══════════════════
   AUDIO
═══════════════════ */
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function playStartup() {
  const ctx = getCtx();
  function bp(freq,t,dur,vol){
    [1,2,3,4].forEach((h,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain(),now=ctx.currentTime+t;
      o.type='sine'; o.frequency.value=freq*h;
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(vol/(i+1),now+0.06);
      g.gain.exponentialRampToValueAtTime(0.0001,now+dur/(i*0.5+1));
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+dur+0.1);
    });
  }
  function ch(freqs,t,dur,vol){ freqs.forEach(f=>bp(f,t,dur,vol/freqs.length)); }
  bp(392,0.00,2.5,0.18); bp(523,0.30,2.2,0.18); bp(659,0.55,2.0,0.16); bp(784,0.75,1.8,0.16);
  ch([261,330,392,523],0.80,2.4,0.22); bp(1047,1.00,1.8,0.10);
  ch([196,247,311,392],1.50,1.8,0.18); ch([261,330,392],2.00,1.4,0.12);
}
function playClick(){
  const ctx=getCtx(), buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.3));
  const s=ctx.createBufferSource(),g=ctx.createGain();
  s.buffer=buf; g.gain.value=0.15; s.connect(g); g.connect(ctx.destination); s.start();
}
function playOpen(){
  const ctx=getCtx();
  [880,1109,1319].forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain(),t=ctx.currentTime+i*0.06;
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.07,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.22);
  });
}

async function runBios(){
  const con=document.getElementById('bios-lines'); con.innerHTML='';
  const cur=document.getElementById('bios-cursor'); cur.style.display='inline';
  for(let i=0;i<LINES.length;i++){
    const l=LINES[i], div=document.createElement('div');
    if(!l.t){ div.innerHTML='&nbsp;'; }
    else if(l.dyn){
      div.className=l.c||''; div.textContent=l.t; con.appendChild(div); await sleep(60);
      for(let k=1024;k<=32768;k+=1024){ div.textContent=l.t+k+'K'; await sleep(14); }
      div.textContent=l.t+l.val; continue;
    } else { div.className=l.c||''; div.textContent=l.t; }
    con.appendChild(div); await sleep(i<6?25:55);
  }
  await sleep(600); cur.style.display='none'; showLogo();
}

/* ═══════════════════

let zTop=100;
const openWins={};

function showDesktop(){
  document.getElementById('logo-screen').style.display='none';
  document.getElementById('desktop').style.display='flex';
  buildIcons(); updateClock(); setInterval(updateClock,10000);
}

function buildIcons(){
  const con=document.getElementById('icon-container');
  DOCS.forEach(doc=>{
    const ic=document.createElement('div');
    ic.className='icon'; ic.dataset.id=doc.id;
    ic.innerHTML=iconSVG(doc.color)+`<span class="icon-label">${doc.label}</span>`;
    let clicks=0, timer=null;
    ic.addEventListener('click',e=>{
      e.stopPropagation(); playClick();
      document.querySelectorAll('.icon').forEach(i=>i.classList.remove('selected'));
      ic.classList.add('selected');
      clicks++;
      if(clicks===1){ timer=setTimeout(()=>{clicks=0;},380); }
      else { clearTimeout(timer); clicks=0; openDoc(doc); }
    });
    con.appendChild(ic);
  });
  document.getElementById('desktop-area').addEventListener('click',()=>{
    document.querySelectorAll('.icon').forEach(i=>i.classList.remove('selected'));
  });
  document.getElementById('desktop').addEventListener('contextmenu',e=>{ e.preventDefault(); restart(); });
}

function makeDraggable(win){
  const tb=win.querySelector('.win-titlebar');

  document.addEventListener('mouseup',()=>{ drag=false; });
}

function addTaskBtn(doc){
  const b=document.createElement('div');
  b.className='taskbar-btn active'; b.id='tb-'+doc.id;
  b.innerHTML=`<svg style="width:12px;height:14px;flex-shrink:0" viewBox="0 0 16 20"><rect width="10" height="20" fill="#fff" stroke="#aaa" stroke-width="0.5"/><polygon points="10,0 16,6 10,6" fill="#ccc"/><rect x="1.5" y="8" width="7" height="1.5" fill="#4169e1"/><rect x="1.5" y="11" width="9" height="1" fill="#aaa"/></svg> ${doc.label}`;
  b.addEventListener('click',()=>{
    playClick();
    const win=openWins[doc.id]; if(!win)return;
    if(win.style.display==='none'){ win.style.display='flex'; win.style.zIndex=++zTop; setActive(doc.id,true); }
    else { win.style.display='none'; setActive(doc.id,false); }
  });
  document.getElementById('taskbar-btns').appendChild(b);
}
function setActive(id,active){ const b=document.getElementById('tb-'+id); if(b)b.classList.toggle('active',active); }
function removeTaskBtn(id){ const b=document.getElementById('tb-'+id); if(b)b.remove(); }

/* ═══════════════════
   CLOCK
═══════════════════ */
function updateClock(){
  const n=new Date(); let h=n.getHours(),m=n.getMinutes(); const ap=h>=12?'PM':'AM';
  h=h%12||12; document.getElementById('clock').textContent=h+':'+String(m).padStart(2,'0')+' '+ap;
}

/* ═══════════════════
   RESTART
═══════════════════ */
function restart(){
  if(audioCtx){ audioCtx.close(); audioCtx=null; }
  Object.keys(openWins).forEach(k=>{ openWins[k].remove(); delete openWins[k]; });
  document.getElementById('taskbar-btns').innerHTML='';
  document.getElementById('icon-container').innerHTML='';
  document.getElementById('desktop').style.display='none';
  document.getElementById('logo-screen').style.display='none';
  document.getElementById('bios').style.display='block';
  runBios();
}
