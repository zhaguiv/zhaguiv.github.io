/* ── BIOS ── */

.win-text-95 { color:#fff; font-family:'Times New Roman',serif; font-size:38px; font-weight:bold; font-style:italic; margin-left:6px; }

.progress-block { width:18px; height:14px; flex-shrink:0; }
@keyframes slideTrack { from{transform:translateX(0)} to{transform:translateX(-20px)} }

/* ── DESKTOP ── */

let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function playStartup() {
  const ctx = getCtx();
  function bp(freq,t,dur,vol){
    [1,2,3,4].forEach((h,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain(),now=ctx.currentTime+t;
      o.type='sine'; o.frequency.value=freq*h;
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(vol/(i+1),now+0.06);
      g.gain.exponentialRampToValueAtTime(0.0001,now+dur/(i*0.5+1));
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+dur+0.1);
    });
  }
  function ch(freqs,t,dur,vol){ freqs.forEach(f=>bp(f,t,dur,vol/freqs.length)); }
  bp(392,0.00,2.5,0.18); bp(523,0.30,2.2,0.18); bp(659,0.55,2.0,0.16); bp(784,0.75,1.8,0.16);

  ch([196,247,311,392],1.50,1.8,0.18); ch([261,330,392],2.00,1.4,0.12);
}
function playClick(){
  const ctx=getCtx(), buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.3));
  const s=ctx.createBufferSource(),g=ctx.createGain();
  s.buffer=buf; g.gain.value=0.15; s.connect(g); g.connect(ctx.destination); s.start();
}
function playOpen(){
  const ctx=getCtx();
  [880,1109,1319].forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain(),t=ctx.currentTime+i*0.06;
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.07,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.22);
  });
}

/* ═══════════════════
   BIOS
═══════════════════ */
const LINES = [
  {t:'Award Modular BIOS v4.51PG, An Energy Star Ally',c:'white'},
  {t:'Copyright (C) 1984-96, Award Software, Inc.',c:''},
  {t:''},
  {t:'IBM COMPATIBLE 486DX/66 BIOS',c:'white'},
  {t:'PCI/ISA BIOS (2A59IMS9)',c:''},
  {t:''},
  {t:'CPU Type  : Intel Pentium II  233MHz',c:''},
  {t:'Co-Processor : Installed',c:''},
  {t:'CPU Clock  : 233MHz',c:''},
  {t:''},
  {t:'Memory Test : ',c:'',dyn:true,val:'32768K OK'},
  {t:''},
  {t:'Award Plug and Play BIOS Extension v1.0A',c:'cyan'},
  {t:'Initialize Plug and Play Cards...',c:''},
  {t:'PNP Init Completed',c:''},
  {t:''},
  {t:'Detecting IDE drives...',c:''},
  {t:'  Primary Master  : QUANTUM FIREBALL TM2110A  2.1GB',c:'yellow'},
  {t:'  Primary Slave   : ATAPI CDROM   24X',c:'yellow'},
  {t:''},
  {t:'Press DEL to enter SETUP',c:'white'},
  {t:''},
  {t:'Starting Windows 95...',c:'white'},
];

async function runBios(){
  const con=document.getElementById('bios-lines'); con.innerHTML='';
  const cur=document.getElementById('bios-cursor'); cur.style.display='inline';
  for(let i=0;i<LINES.length;i++){
    const l=LINES[i], div=document.createElement('div');
    if(!l.t){ div.innerHTML='&nbsp;'; }
    else if(l.dyn){
      div.className=l.c||''; div.textContent=l.t; con.appendChild(div); await sleep(60);
      for(let k=1024;k<=32768;k+=1024){ div.textContent=l.t+k+'K'; await sleep(14); }
      div.textContent=l.t+l.val; continue;
    } else { div.className=l.c||''; div.textContent=l.t; }
    con.appendChild(div); await sleep(i<6?25:55);
  }
  await sleep(600); cur.style.display='none'; showLogo();
}

/* ═══════════════════
   LOGO
═══════════════════ */
function buildTrack(){
  const t=document.getElementById('progress-track'); t.innerHTML='';
  const C=['#000080','#000080','#1010a0','#0000ff','#2020c0','#000080','#000080','#000080','#0000c8'];
  for(let i=0;i<24;i++){const b=document.createElement('div');b.className='progress-block';b.style.background=C[i%C.length];t.appendChild(b);}
}
function showLogo(){
  document.getElementById('bios').style.display='none';
  document.getElementById('logo-screen').style.display='flex';
  buildTrack(); playStartup();
  setTimeout(showDesktop, 3400);
}

/* ═══════════════════
   WORD DOC ICON SVG
═══════════════════ */

  return `<svg viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg" style="width:32px;height:40px;display:block">
    <rect x="0" y="0" width="22" height="40" rx="1" fill="#fff" stroke="#999" stroke-width="0.6"/>
    <polygon points="22,0 32,10 22,10" fill="#d0d0d0"/>
    <polygon points="22,0 32,10 22,10" fill="none" stroke="#999" stroke-width="0.6"/>
    <rect x="22" y="10" width="10" height="30" fill="#fff" stroke="#999" stroke-width="0.6"/>
    <rect x="3" y="12" width="12" height="2.5" rx="0.5" fill="${color}" opacity="0.9"/>
    <rect x="3" y="17.5" width="26" height="1.5" rx="0.5" fill="#bbb"/>
    <rect x="3" y="21"   width="26" height="1.5" rx="0.5" fill="#bbb"/>
    <rect x="3" y="24.5" width="20" height="1.5" rx="0.5" fill="#bbb"/>
    <rect x="3" y="28"   width="26" height="1.5" rx="0.5" fill="#bbb"/>
    <rect x="3" y="31.5" width="14" height="1.5" rx="0.5" fill="#bbb"/>
    <rect x="3" y="35"   width="22" height="1.5" rx="0.5" fill="#bbb"/>
  </svg>`;
}

/* ═══════════════════
   DESKTOP + ICONS
═══════════════════ */
let zTop=100;
const openWins={};

function showDesktop(){
  document.getElementById('logo-screen').style.display='none';
  document.getElementById('desktop').style.display='flex';
  buildIcons(); updateClock(); setInterval(updateClock,10000);
}

function buildIcons(){
  const con=document.getElementById('icon-container');
  DOCS.forEach(doc=>{
    const ic=document.createElement('div');
    ic.className='icon'; ic.dataset.id=doc.id;
    ic.innerHTML=iconSVG(doc.color)+`<span class="icon-label">${doc.label}</span>`;
    let clicks=0, timer=null;
    ic.addEventListener('click',e=>{
      e.stopPropagation(); playClick();
      document.querySelectorAll('.icon').forEach(i=>i.classList.remove('selected'));
      ic.classList.add('selected');
      clicks++;
      if(clicks===1){ timer=setTimeout(()=>{clicks=0;},380); }
      else { clearTimeout(timer); clicks=0; openDoc(doc); }
    });
    con.appendChild(ic);
  });
  document.getElementById('desktop-area').addEventListener('click',()=>{
    document.querySelectorAll('.icon').forEach(i=>i.classList.remove('selected'));
  });
  document.getElementById('desktop').addEventListener('contextmenu',e=>{ e.preventDefault(); restart(); });
}

/* ═══════════════════
   OPEN WINDOW
═══════════════════ */
function openDoc(doc){
  if(openWins[doc.id]){
    const w=openWins[doc.id]; w.style.display='flex'; w.style.zIndex=++zTop;
    setActive(doc.id,true); return;
  }
  playOpen();

  const offset=Object.keys(openWins).length*26;
  const w=document.createElement('div');
  w.className='win-window';
  w.style.cssText=`top:${40+offset}px;left:${70+offset}px;width:680px;height:540px;z-index:${++zTop}`;

  w.innerHTML=`
    <div class="win-titlebar">
      <svg class="win-title-icon" viewBox="0 0 16 20"><rect width="10" height="20" fill="#fff" stroke="#aaa" stroke-width="0.5"/><polygon points="10,0 16,6 10,6" fill="#ccc"/><rect x="1.5" y="8" width="7" height="1.5" fill="#4169e1"/><rect x="1.5" y="11" width="9" height="1.5" fill="#aaa"/><rect x="1.5" y="14" width="9" height="1.5" fill="#aaa"/><rect x="1.5" y="17" width="6" height="1.5" fill="#aaa"/></svg>
      <span class="win-title-text">${doc.title}</span>
      <div class="win-btns">
        <div class="win-btn btn-min">_</div>
        <div class="win-btn btn-max">□</div>
        <div class="win-btn btn-close">✕</div>
      </div>
    </div>
    <div class="win-menubar">
      <span class="win-menu-item">File</span><span class="win-menu-item">Edit</span><span class="win-menu-item">View</span>
      <span class="win-menu-item">Insert</span><span class="win-menu-item">Format</span><span class="win-menu-item">Tools</span>
      <span class="win-menu-item">Table</span><span class="win-menu-item">Window</span><span class="win-menu-item">Help</span>
    </div>
    <div class="win-toolbar">
      <div class="tb-btn">💾</div><div class="tb-btn">📁</div><div class="tb-btn">🖨</div>
      <div class="tb-sep"></div>
      <div class="tb-btn">✂</div><div class="tb-btn">📋</div>
      <div class="tb-sep"></div>
      <div class="tb-btn"><b>B</b></div><div class="tb-btn"><i>I</i></div><div class="tb-btn"><u>U</u></div>
      <div class="tb-sep"></div>
      <span class="tb-label" style="font-family:Arial;font-size:11px">Times New Roman</span>
      <div class="tb-sep"></div>
      <span class="tb-label" style="font-family:Arial;font-size:11px">12</span>
    </div>
    <div class="win-body">
      <div class="doc-scroll"><div class="doc-page">${doc.content}</div></div>
    </div>
    <div class="win-statusbar">
      <div class="status-cell">Page 1</div>
      <div class="status-cell">Sec 1</div>
      <div class="status-cell">1/1</div>
      <div class="status-cell" style="margin-left:auto">OVR</div>
    </div>`;

  // Focus
  w.addEventListener('mousedown',()=>{
    w.style.zIndex=++zTop;
    document.querySelectorAll('.win-titlebar').forEach(tb=>tb.style.background='#808080');
    w.querySelector('.win-titlebar').style.background='#000080';
  });

  // Close
  w.querySelector('.btn-close').addEventListener('click',()=>{ playClick(); w.remove(); delete openWins[doc.id]; removeTaskBtn(doc.id); });

  // Minimize
  w.querySelector('.btn-min').addEventListener('click',()=>{ playClick(); w.style.display='none'; setActive(doc.id,false); });

  // Maximize / restore
  let maxed=false, saved={};
  w.querySelector('.btn-max').addEventListener('click',()=>{
    playClick();
    const area=document.getElementById('desktop-area');
    if(!maxed){ saved={top:w.style.top,left:w.style.left,width:w.style.width,height:w.style.height}; w.style.cssText+=`;top:0;left:0;width:${area.offsetWidth}px;height:${area.offsetHeight}px`; maxed=true; }
    else { w.style.top=saved.top; w.style.left=saved.left; w.style.width=saved.width; w.style.height=saved.height; maxed=false; }
  });

  makeDraggable(w);
  document.getElementById('desktop-area').appendChild(w);
  openWins[doc.id]=w;
  addTaskBtn(doc);
}

function makeDraggable(win){
  const tb=win.querySelector('.win-titlebar');
  let drag=false,ox=0,oy=0;
  tb.addEventListener('mousedown',e=>{ if(e.target.classList.contains('win-btn'))return; drag=true; ox=e.clientX-win.offsetLeft; oy=e.clientY-win.offsetTop; e.preventDefault(); });
  document.addEventListener('mousemove',e=>{ if(!drag)return; win.style.left=(e.clientX-ox)+'px'; win.style.top=(e.clientY-oy)+'px'; });
  document.addEventListener('mouseup',()=>{ drag=false; });
}

/* ═══════════════════
   TASKBAR
═══════════════════ */
function addTaskBtn(doc){
  const b=document.createElement('div');
  b.className='taskbar-btn active'; b.id='tb-'+doc.id;
  b.innerHTML=`<svg style="width:12px;height:14px;flex-shrink:0" viewBox="0 0 16 20"><rect width="10" height="20" fill="#fff" stroke="#aaa" stroke-width="0.5"/><polygon points="10,0 16,6 10,6" fill="#ccc"/><rect x="1.5" y="8" width="7" height="1.5" fill="#4169e1"/><rect x="1.5" y="11" width="9" height="1" fill="#aaa"/></svg> ${doc.label}`;
  b.addEventListener('click',()=>{
    playClick();
    const win=openWins[doc.id]; if(!win)return;
    if(win.style.display==='none'){ win.style.display='flex'; win.style.zIndex=++zTop; setActive(doc.id,true); }
    else { win.style.display='none'; setActive(doc.id,false); }
  });
  document.getElementById('taskbar-btns').appendChild(b);
}
function setActive(id,active){ const b=document.getElementById('tb-'+id); if(b)b.classList.toggle('active',active); }
function removeTaskBtn(id){ const b=document.getElementById('tb-'+id); if(b)b.remove(); }

/* ═══════════════════
   CLOCK
═══════════════════ */
function updateClock(){
  const n=new Date(); let h=n.getHours(),m=n.getMinutes(); const ap=h>=12?'PM':'AM';
  h=h%12||12; document.getElementById('clock').textContent=h+':'+String(m).padStart(2,'0')+' '+ap;
}

/* ═══════════════════
   RESTART
═══════════════════ */
function restart(){
  if(audioCtx){ audioCtx.close(); audioCtx=null; }
  Object.keys(openWins).forEach(k=>{ openWins[k].remove(); delete openWins[k]; });
  document.getElementById('taskbar-btns').innerHTML='';
  document.getElementById('icon-container').innerHTML='';
  document.getElementById('desktop').style.display='none';
  document.getElementById('logo-screen').style.display='none';
  document.getElementById('bios').style.display='block';
  runBios();
}

runBios();
</script>
